<div class="container players-section">
    <!--HEADER: Título y botón de filtros-->
    <div class="players-header d-flex justify-content-between align-items-center mb-4">
       <h2 class="section-title m-0">Plantilla del equipo Enders</h2>
        <button class="btn btn-outline-light" (click)="showFilters = !showFilters">
            Filtros
        </button>
    </div>
    <!--Panel con filtros-->
    @if(showFilters){
    <div class="card p-3 filter-panel">
        <div class="row g-3">
            <!--Filtro Nombre-->
            <div class="col-12 col-md-4">
                <input type="text" class="form-control" placeholder="Buscar jugador" [(ngModel)]="searchText" (input)="applyFilters()">
            </div>
            <!--Filtro Posición-->
            <div class="col-12 col-md-4">
                <select class="form-select" [(ngModel)]="positionFilter" (change)="applyFilters()">
                    <option value="">Todas las posiciones</option>
                    <option value="Base">Base</option>
                    <option value="Escolta">Escolta</option>
                    <option value="Alero">Alero</option>
                    <option value="Ala-Pivot">Ala-Pivot</option>
                    <option value="Pivot">Pivot</option>
                </select>
            </div>
            <!--Filtro Edad-->
            <div class="col-12 col-md-4">
                <input type="number" class="form-control" placeholder="Edad máxima" [(ngModel)]="ageFilter" (input)="applyFilters()">
            </div>
        </div>
    </div>
    }
    <!--Fichas de jugadores-->
    <div class="row g-4 players-grid">
        @for(player of filteredPlayers; track player.id; let i = $index){
            <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 player-card-entry" [style.--card-index]="i">
               <div class="card h-100 text-center shadow-sm player-card" (click)="selectPlayer(player)">
                    <img [src]="player.foto"
                    class="card-img-top"
                    alt="foto jugador">
                    <div class="card-body">
                        <h5 class="card-title">{{player.nombre}} {{player.apellidos}}</h5> 
                        <p class="card-text mb-1">
                            <strong>Posición: </strong>{{player.posicion}}
                        </p>
                        <p class="card-text mb-1">
                            <strong>Edad: </strong>{{player.edad}} años
                        </p>
                        <p class="card-text mb-1">
                            <strong>Altura: </strong>{{player.altura}} m
                        </p>     
                    </div>
               </div>
            </div>           
        }       
    </div>
</div>
